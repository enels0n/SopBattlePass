database:
  type: sqlite
  table-prefix: sopbattlepass_
  sqlite-file: battlepass.db
  host: 127.0.0.1
  port: 3306
  database: minecraft
  username: root
  password: ""
  pool-name: SopBattlePass
  maximum-pool-size: 10
  minimum-idle: 2
  connection-timeout: 30000
  idle-timeout: 600000
  max-lifetime: 1800000

network:
  enabled: false
  server-id: survival-1
  server-group: survival

season:
  active-id: season-1
  timezone: Europe/Moscow
  menu:
    not-started:
      material: CLOCK
      custom-model-data: 0
      name: "&eSeason starts soon"
      lore:
        - "&7Season: &f{season_name}"
        - "&7Starts at: &f{season_start}"
        - "&7Come back when the season goes live."

menu:
  shared:
    back-main:
      material: ARROW
      custom-model-data: 0
      name: "&aBack"
      lore:
        - "&7Return to the main battle pass menu"
    error:
      material: BARRIER
      custom-model-data: 0
      name: "&cUnable to load data"
      lore:
        - "&7{error}"
    category-disabled:
      material: BARRIER
      custom-model-data: 0
      name: "&cCategory disabled"
      lore:
        - "&7This mission category is currently disabled."

premium:
  permission-node: sopbattlepass.premium
  permission-enabled: true
  season-flag-enabled: true

boosters:
  global-multiplier: 1.0
  permission-multipliers: {}

integrations:
  axenvoy:
    enabled: true
  breweryx:
    enabled: true
  custom-fishing:
    enabled: true
  pinata-party:
    enabled: true

missions:
  daily:
    enabled: true
    mode: random
    amount-per-group: 5
    shared-slot-progress: true
    allow-template-repeat: true
  weekly:
    enabled: true
    mode: fixed
    amount-per-week: 5
    shared-slot-progress: true
    allow-template-repeat: false
    keep-weekly-active: true
    hide-future-weeks: true
  global:
    enabled: true
    mode: fixed
  menu:
    previous-page:
      # Supports regular materials or HEAD:<texture>
      material: ARROW
      custom-model-data: 0
      name: "&ePrevious page"
      lore:
        - "&7Open the previous mission page"
    next-page:
      # Supports regular materials or HEAD:<texture>
      material: ARROW
      custom-model-data: 0
      name: "&eNext page"
      lore:
        - "&7Open the next mission page"
    week-selector:
      # Supports regular materials or HEAD:<texture>
      material: CLOCK
      custom-model-data: 0
      name: "&6Week {week}"
      lore:
        - "&7Open missions for week &f{week}"
    week-selector-empty:
      material: BARRIER
      custom-model-data: 0
      name: "&cNo weekly missions"
      lore:
        - "&7There are no weekly mission weeks available right now."
    back-to-weeks:
      material: ARROW
      custom-model-data: 0
      name: "&aBack"
      lore:
        - "&7Return to weekly week selection"
    empty:
      material: BARRIER
      custom-model-data: 0
      name: "&cNo active missions"
      lore:
        - "&7Nothing is active for this page right now."
  admin:
    allow-manual-reroll: true

rewards:
  claim:
    default-eligible-server-ids: []
    default-claim-limit: 1
  menu:
    empty-slot:
      # Supports regular materials or HEAD:<texture>
      material: BLACK_STAINED_GLASS_PANE
      custom-model-data: 0
      name: " "
      lore: []
    previous-page:
      # Supports regular materials or HEAD:<texture>
      material: ARROW
      custom-model-data: 0
      name: "&ePrevious page"
      lore:
        - "&7Open the previous reward page"
    next-page:
      # Supports regular materials or HEAD:<texture>
      material: ARROW
      custom-model-data: 0
      name: "&eNext page"
      lore:
        - "&7Open the next reward page"
    states:
      locked:
        # Supports regular materials or HEAD:<texture>
        material: GRAY_STAINED_GLASS_PANE
        custom-model-data: 0
        name: "&7Level {level} - {track}"
        lore:
          - "&7Reach this level to unlock this reward."
      free-claimable:
        # Supports regular materials or HEAD:<texture>
        material: CHEST
        custom-model-data: 0
        name: "&aLevel {level} - {track}"
        lore:
          - "&eClick to claim this reward on this server."
      premium-claimable:
        # Supports regular materials or HEAD:<texture>
        material: EMERALD
        custom-model-data: 0
        name: "&aLevel {level} - {track}"
        lore:
          - "&eClick to claim this reward on this server."
      free-claimed:
        # Supports regular materials or HEAD:<texture>
        material: REDSTONE_BLOCK
        custom-model-data: 0
        name: "&cLevel {level} - {track}"
        lore:
          - "&7This reward is not currently claimable on this server."
      premium-claimed:
        # Supports regular materials or HEAD:<texture>
        material: REDSTONE_BLOCK
        custom-model-data: 0
        name: "&cLevel {level} - {track}"
        lore:
          - "&7This reward is not currently claimable on this server."
  premium-locked:
    # Supports regular materials or HEAD:<texture>
    material: BARRIER
    custom-model-data: 0
    name: "&cLevel {level} - premium"
    lore:
      - "&7Reach this level and unlock premium"
      - "&7to claim the reward later."

messages:
  prefix: "&6SopBattlePass &8| "
  player-only: "{prefix}&cOnly players can use this command."
  no-permission: "{prefix}&cYou do not have permission."
  reload: "{prefix}&aConfiguration reloaded."
  open-self: "{prefix}&eOpened the battle pass menu."
  open-other: "{prefix}&eOpened the battle pass menu for {player}."
  player-not-found: "{prefix}&cPlayer not found."
  xp-added: "{prefix}&aAdded &e{amount}&a xp to &e{player}&a."
  premium-granted: "{prefix}&aPremium enabled for &e{player}&a in the current season."
  premium-revoked: "{prefix}&ePremium removed from &e{player}&e in the current season."
  daily-rerolled: "{prefix}&aDaily missions rerolled."
  weekly-rerolled: "{prefix}&aWeekly missions rerolled."
  custom-progress-added: "{prefix}&aAdded &e{amount}&a custom progress for &e{player}&a on &e{target}&a."
  mission-progress:
    enabled: true
    notify-percentages:
      - 10
      - 25
      - 50
      - 80
      - 90
    format: "{prefix}&7Progress for &e{mission}&7: &f{progress}&8/&f{required} &8[&e{percent}%&8]"
  mission-completed: "{prefix}&aMission completed: &e{mission} &7(+{xp} xp)"
  mission-category-disabled: "{prefix}&cThis mission category is disabled."
  reward-claimed: "{prefix}&aClaimed level &e{level} &a{track} reward."
  reward-claim-failed: "{prefix}&cCould not claim level &e{level} &c{track} reward."
  usage:
    - "{prefix}&e/sopbattlepass"
    - "{prefix}&e/sopbattlepass open [player]"
    - "{prefix}&e/sopbattlepass reload"
    - "{prefix}&e/sopbattlepass xp add <player> <amount>"
    - "{prefix}&e/sopbattlepass premium <grant|revoke> <player>"
    - "{prefix}&e/sopbattlepass reroll <daily|weekly>"
    - "{prefix}&e/sopbattlepass progress custom <player> <target> [amount]"
